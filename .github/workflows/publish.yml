name: Publish to GitHub Packages

on:
  push:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@flybyme'
      - run: npm ci
      - run: npm run build
      - name: Publish if version is new
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          if npm view @flybyme/castellan@$CURRENT_VERSION version --registry=https://npm.pkg.github.com &>/dev/null; then
            echo "Version $CURRENT_VERSION is already published to GitHub Packages. Skipping publish."
          else
            npm publish
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
